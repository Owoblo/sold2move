name: Postcard Pipeline — Windsor + WKG + London + Ottawa

on:
  schedule:
    # Every 2 days at 11 AM EST (4 PM UTC)
    - cron: '0 16 */2 * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD), default: 2 days ago'
        required: false
      to_date:
        description: 'End date (YYYY-MM-DD), default: today'
        required: false
      skip_photos:
        description: 'Skip photo fetching'
        type: boolean
        default: false
      skip_furniture:
        description: 'Skip furniture check'
        type: boolean
        default: false
      skip_scrape:
        description: 'Skip Zillow scrape (use existing DB data)'
        type: boolean
        default: false
      regions:
        description: 'Which regions to run (comma-separated: windsor,wkg,london,ottawa)'
        required: false
        default: 'windsor,wkg,ottawa'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Calculate date range
        id: dates
        run: |
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            echo "from=${{ github.event.inputs.from_date }}" >> $GITHUB_OUTPUT
          else
            echo "from=$(date -d '2 days ago' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ github.event.inputs.to_date }}" ]; then
            echo "to=${{ github.event.inputs.to_date }}" >> $GITHUB_OUTPUT
          else
            echo "to=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Build pipeline flags
        id: flags
        run: |
          FLAGS="--include-unscanned"
          if [ "${{ github.event.inputs.skip_photos }}" = "true" ]; then
            FLAGS="$FLAGS --skip-photos"
          fi
          if [ "${{ github.event.inputs.skip_furniture }}" = "true" ]; then
            FLAGS="$FLAGS --skip-furniture"
          fi
          if [ "${{ github.event.inputs.skip_scrape }}" = "true" ]; then
            FLAGS="$FLAGS --skip-scrape"
          fi
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Resolve regions
        id: regions
        run: |
          REGIONS="${{ github.event.inputs.regions }}"
          # London is currently paused; un-pause by adding it back here and to the input default above.
          if [ -z "$REGIONS" ]; then REGIONS="windsor,wkg,ottawa"; fi
          echo "list=$REGIONS" >> $GITHUB_OUTPUT

      # ─── WINDSOR ─────────────────────────────────────────────────────────────

      - name: Run Windsor pipeline
        if: contains(steps.regions.outputs.list, 'windsor')
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/postcard-pipeline.cjs \
            --region windsor \
            --from ${{ steps.dates.outputs.from }} \
            --to ${{ steps.dates.outputs.to }} \
            ${{ steps.flags.outputs.flags }}

      - name: Find Windsor output files
        id: windsor_files
        run: |
          CSV=$(ls -t Windsor_Postcards_*.csv 2>/dev/null | head -1)
          PDF=$(ls -t Windsor_Postcards_*.pdf 2>/dev/null | head -1)
          if [ -z "$CSV" ] || [ -z "$PDF" ]; then
            echo "No Windsor output files (no listings in date range)"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "csv=$CSV" >> $GITHUB_OUTPUT
            echo "pdf=$PDF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Email Windsor results
        if: steps.windsor_files.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/postcard-email-results.cjs \
            "${{ steps.windsor_files.outputs.csv }}" \
            "${{ steps.windsor_files.outputs.pdf }}" \
            --region windsor

      # ─── WKG (Waterloo / Kitchener / Guelph) ────────────────────────────────

      - name: Run WKG pipeline
        if: contains(steps.regions.outputs.list, 'wkg')
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/postcard-pipeline.cjs \
            --region wkg \
            --from ${{ steps.dates.outputs.from }} \
            --to ${{ steps.dates.outputs.to }} \
            ${{ steps.flags.outputs.flags }}

      - name: Find WKG output files
        id: wkg_files
        run: |
          CSV=$(ls -t WKG_Postcards_*.csv 2>/dev/null | head -1)
          PDF=$(ls -t WKG_Postcards_*.pdf 2>/dev/null | head -1)
          if [ -z "$CSV" ] || [ -z "$PDF" ]; then
            echo "No WKG output files (no listings in date range)"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "csv=$CSV" >> $GITHUB_OUTPUT
            echo "pdf=$PDF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Email WKG results
        if: steps.wkg_files.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/postcard-email-results.cjs \
            "${{ steps.wkg_files.outputs.csv }}" \
            "${{ steps.wkg_files.outputs.pdf }}" \
            --region wkg

      # ─── LONDON ──────────────────────────────────────────────────────────────

      - name: Run London pipeline
        if: contains(steps.regions.outputs.list, 'london')
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/postcard-pipeline.cjs \
            --region london \
            --from ${{ steps.dates.outputs.from }} \
            --to ${{ steps.dates.outputs.to }} \
            ${{ steps.flags.outputs.flags }}

      - name: Find London output files
        id: london_files
        run: |
          CSV=$(ls -t London_Postcards_*.csv 2>/dev/null | head -1)
          PDF=$(ls -t London_Postcards_*.pdf 2>/dev/null | head -1)
          if [ -z "$CSV" ] || [ -z "$PDF" ]; then
            echo "No London output files (no listings in date range)"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "csv=$CSV" >> $GITHUB_OUTPUT
            echo "pdf=$PDF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Email London results
        if: steps.london_files.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/postcard-email-results.cjs \
            "${{ steps.london_files.outputs.csv }}" \
            "${{ steps.london_files.outputs.pdf }}" \
            --region london

      # ─── OTTAWA ──────────────────────────────────────────────────────────────

      - name: Run Ottawa pipeline
        if: contains(steps.regions.outputs.list, 'ottawa')
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/postcard-pipeline.cjs \
            --region ottawa \
            --from ${{ steps.dates.outputs.from }} \
            --to ${{ steps.dates.outputs.to }} \
            ${{ steps.flags.outputs.flags }}

      - name: Find Ottawa output files
        id: ottawa_files
        run: |
          CSV=$(ls -t Ottawa_Postcards_*.csv 2>/dev/null | head -1)
          PDF=$(ls -t Ottawa_Postcards_*.pdf 2>/dev/null | head -1)
          if [ -z "$CSV" ] || [ -z "$PDF" ]; then
            echo "No Ottawa output files (no listings in date range)"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "csv=$CSV" >> $GITHUB_OUTPUT
            echo "pdf=$PDF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Email Ottawa results
        if: steps.ottawa_files.outputs.found == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/postcard-email-results.cjs \
            "${{ steps.ottawa_files.outputs.csv }}" \
            "${{ steps.ottawa_files.outputs.pdf }}" \
            --region ottawa

      # ─── Upload all artifacts ─────────────────────────────────────────────────

      - name: Upload all postcard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postcards-${{ steps.dates.outputs.from }}-to-${{ steps.dates.outputs.to }}
          path: |
            Windsor_Postcards_*.csv
            Windsor_Postcards_*.pdf
            WKG_Postcards_*.csv
            WKG_Postcards_*.pdf
            London_Postcards_*.csv
            London_Postcards_*.pdf
            Ottawa_Postcards_*.csv
            Ottawa_Postcards_*.pdf
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify when a selected region produced no postcards
        if: |
          always() && !failure() && !cancelled() && (
            (contains(steps.regions.outputs.list, 'windsor') && steps.windsor_files.outputs.found != 'true') ||
            (contains(steps.regions.outputs.list, 'wkg') && steps.wkg_files.outputs.found != 'true') ||
            (contains(steps.regions.outputs.list, 'london') && steps.london_files.outputs.found != 'true') ||
            (contains(steps.regions.outputs.list, 'ottawa') && steps.ottawa_files.outputs.found != 'true')
          )
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REGION_LIST: ${{ steps.regions.outputs.list }}
          WINDSOR_FOUND: ${{ steps.windsor_files.outputs.found }}
          WKG_FOUND: ${{ steps.wkg_files.outputs.found }}
          LONDON_FOUND: ${{ steps.london_files.outputs.found }}
          OTTAWA_FOUND: ${{ steps.ottawa_files.outputs.found }}
          DATE_FROM: ${{ steps.dates.outputs.from }}
          DATE_TO: ${{ steps.dates.outputs.to }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node -e "
          const https = require('https');
          const selected = (process.env.REGION_LIST || '').split(',').map(s => s.trim()).filter(Boolean);
          const found = {
            windsor: process.env.WINDSOR_FOUND === 'true',
            wkg:     process.env.WKG_FOUND === 'true',
            london:  process.env.LONDON_FOUND === 'true',
            ottawa:  process.env.OTTAWA_FOUND === 'true',
          };
          const empty = selected.filter(r => !found[r]);
          if (empty.length === 0) process.exit(0);
          const rows = selected.map(r => {
            const ok = found[r];
            const colour = ok ? '#16a34a' : '#dc2626';
            const label = ok ? 'postcards generated' : 'NO postcards';
            return '<tr><td style=\"padding:8px;border:1px solid #ddd\">' + r + '</td>' +
                   '<td style=\"padding:8px;border:1px solid #ddd;color:' + colour + ';font-weight:bold\">' + label + '</td></tr>';
          }).join('');
          const body = JSON.stringify({
            from: 'Sold2Move Pipeline <postcards@sold2move.com>',
            to: ['johnowolabi80@gmail.com'],
            subject: 'Pipeline produced no postcards for: ' + empty.join(', ') + ' (' + process.env.DATE_FROM + ' to ' + process.env.DATE_TO + ')',
            html:
              '<div style=\"font-family:Arial,sans-serif;max-width:600px\">' +
                '<h2 style=\"color:#b45309\">Some regions produced no postcards</h2>' +
                '<p>The pipeline finished without errors but at least one selected region returned zero listings (no scraped data, no rows passed step 1, or all were filtered out downstream).</p>' +
                '<table style=\"border-collapse:collapse;width:100%;margin:16px 0\">' + rows + '</table>' +
                '<p><a href=\"https://github.com/' + process.env.REPOSITORY + '/actions/runs/' + process.env.RUN_ID + '\" style=\"background:#1d4ed8;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px\">Open the run logs</a></p>' +
                '<p>To diagnose: open the failing region\\'s \"Run X pipeline\" step and look for the per-step counts (\"Got N current results\", \"Total eligible listings: N\", \"Final postcard count: N\").</p>' +
              '</div>',
          });
          const req = https.request({
            hostname: 'api.resend.com', path: '/emails', method: 'POST',
            headers: { 'Authorization': 'Bearer ' + process.env.RESEND_API_KEY, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
          }, res => { let d = ''; res.on('data', c => d += c); res.on('end', () => console.log('Empty-region alert sent:', res.statusCode, d)); });
          req.on('error', e => console.error('Alert failed:', e.message));
          req.write(body); req.end();
          "

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node -e "
          const https = require('https');
          const body = JSON.stringify({
            from: 'Sold2Move Pipeline <postcards@sold2move.com>',
            to: ['johnowolabi80@gmail.com'],
            subject: 'Pipeline FAILED — ${{ github.workflow }} (${{ steps.dates.outputs.from }} to ${{ steps.dates.outputs.to }})',
            html: \`
              <div style=\"font-family: Arial, sans-serif; max-width: 600px;\">
                <h2 style=\"color: #dc2626;\">Postcard Pipeline Failed</h2>
                <p>The pipeline encountered an error and did not complete successfully.</p>
                <table style=\"border-collapse: collapse; width: 100%; margin: 16px 0;\">
                  <tr><td style=\"padding: 8px; border: 1px solid #ddd; background: #f5f5f5;\">Workflow</td><td style=\"padding: 8px; border: 1px solid #ddd;\">${{ github.workflow }}</td></tr>
                  <tr><td style=\"padding: 8px; border: 1px solid #ddd; background: #f5f5f5;\">Date range</td><td style=\"padding: 8px; border: 1px solid #ddd;\">${{ steps.dates.outputs.from }} to ${{ steps.dates.outputs.to }}</td></tr>
                  <tr><td style=\"padding: 8px; border: 1px solid #ddd; background: #f5f5f5;\">Regions</td><td style=\"padding: 8px; border: 1px solid #ddd;\">${{ steps.regions.outputs.list }}</td></tr>
                  <tr><td style=\"padding: 8px; border: 1px solid #ddd; background: #f5f5f5;\">Run ID</td><td style=\"padding: 8px; border: 1px solid #ddd;\">${{ github.run_id }}</td></tr>
                </table>
                <p><a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\" style=\"background: #1d4ed8; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;\">View Full Logs</a></p>
                <hr style=\"border: none; border-top: 1px solid #eee; margin: 24px 0;\">
                <p style=\"color: #888; font-size: 12px;\">Sold2Move Postcard Pipeline — automated error alert</p>
              </div>
            \`,
          });
          const req = https.request({
            hostname: 'api.resend.com', path: '/emails', method: 'POST',
            headers: { 'Authorization': 'Bearer ' + process.env.RESEND_API_KEY, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
          }, res => { let d = ''; res.on('data', c => d += c); res.on('end', () => console.log('Alert sent:', res.statusCode, d)); });
          req.on('error', e => console.error('Alert failed:', e.message));
          req.write(body); req.end();
          "
